<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Text:ital@0;1&family=Urbanist:wght@300;400;500;600;700;800&display=swap"
    />
    <link rel="stylesheet" href="../shared/base/main.css" />
    <link rel="stylesheet" href="resources.css" />
    <title>Ekehi — Resources</title>
  </head>
  <body>

    <header class="site-header">
      <nav id="nav-root" class="nav" aria-label="Main navigation"></nav>
    </header>

    <main class="container flex flex-col gap-8">

      <!-- Page header -->
      <section class="container__hero flex flex-col self-center">
        <h1 class="container__hero--title font-sans font-bold text-center">
          Training &amp; Resources Library
        </h1>
        <p class="container__hero--description self-center text-center">
          Explore high-quality training programmes, accelerators, and business
          workshops designed for women entrepreneurs
        </p>
      </section>

      <!-- Search + filters -->
      <section class="filter__section flex flex-col gap-4">
        <div>
          <div id="search-bar"></div>
        </div>
        <div id="filter-dropdowns" class="filter__section--dropdowns flex gap-2"></div>
      </section>

      <!-- Trainings list — populated by issue #61 -->
      <section class="results-section">
        <div id="trainings-list"></div>
      </section>

    </main>

    <footer id="footer-root" class="footer"></footer>

    <!-- Single module script — all imports handled inside resources.js -->
    <script type="module" src="resources.js"></script>

  </body>
</html>

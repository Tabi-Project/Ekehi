<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Text:ital@0;1&family=Urbanist:wght@300;400;500;600;700;800&display=swap"
    />
    <link rel="stylesheet" href="../shared/base/main.css" />
    <link rel="stylesheet" href="resources.css" />
    <title>Ekehi — Resources</title>
  </head>
  <body>
    <header class="site-header">
      <nav id="nav-root" class="nav" aria-label="Main navigation"></nav>
    </header>

    <main class="container flex flex-col gap-8">
      <section class="container__hero flex flex-col gap-2 text-center">
        <h1 class="container__hero--title">Training &amp; Resources Library</h1>
        <p class="container__hero--description">
          Explore high-quality training programmes, accelerators, and business
          workshops designed for women entrepreneurs
        </p>
      </section>

      <section class="filter__section flex flex-col gap-4">
        <div>
          <div id="search-bar"></div>
        </div>
        <div
          id="filter-dropdowns"
          class="filter__section--dropdowns flex flex-wrap gap-4"
        ></div>
      </section>


     <section class="templates">
        <div class="templates__header flex justify-between items-center mb-auto">
          <h2 class="font-sans text-2xl text-primary font-bold">Templates</h2>
          <button class="templates__header--btn px-4 py-2 rounded-md text-sm text-muted font-sans">
            View all templates
          </button>
        </div>

        <div id="templates-grid" class="flex flex-wrap justify-between">
          <!-- Rendered by loadTemplates() -->
        </div>
</section>



      <section class="results-section">
        <div id="trainings-list"></div>
      </section>

      <section class="guides-section">
        <div id="guides-list"></div>
      </section>
    </main>

    <footer id="footer-root" class="footer"></footer>

    <script type="module" src="resources.js"></script>
  </body>
</html>

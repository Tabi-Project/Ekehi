<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Text:ital@0;1&family=Urbanist:wght@300;400;500;600;700;800&display=swap"
    />
    <link rel="stylesheet" href="/shared/base/main.css" />
    <link rel="stylesheet" href="/admin/admin.css" />
    <title>Ekehi Admin — Dashboard</title>
  </head>
  <body>
    <div class="admin-layout">
      <aside id="admin-sidebar" class="admin-sidebar"></aside>

      <main class="admin-main">
        <header class="admin-main__header">
          <h1 class="admin-main__title">Dashboard</h1>
          <p class="admin-main__subtitle">Overview of pending content submissions</p>
        </header>

        <section id="stat-cards" class="admin-stats">
          <p class="loading">Loading stats…</p>
        </section>

        <section id="recent-queue">
          <h2 style="font-size: var(--text-lg); font-weight: var(--font-semibold); margin-bottom: var(--space-4); color: var(--color-text-primary);">
            Recent Pending Submissions
          </h2>
          <div class="admin-table-wrap">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Title</th>
                  <th>Type</th>
                  <th>Submitted by</th>
                  <th>Submitted</th>
                  <th>Status</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="recent-queue-body">
                <tr><td colspan="6" class="loading">Loading…</td></tr>
              </tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="/admin/admin.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Text:ital@0;1&family=Urbanist:wght@300;400;500;600;700;800&display=swap"
    />
    <link rel="stylesheet" href="/shared/base/main.css" />
    <link rel="stylesheet" href="/admin/admin.css" />
    <title>Ekehi Admin — Review</title>
  </head>
  <body>
    <div class="admin-layout">
      <aside id="admin-sidebar" class="admin-sidebar"></aside>

      <main class="admin-main">
        <header class="admin-main__header">
          <p style="font-size: var(--text-sm); color: var(--color-text-muted); margin-bottom: var(--space-2);">
            <a href="/admin/queue/" style="color: var(--color-primary);">← Back to queue</a>
          </p>
          <h1 class="admin-main__title" id="review-title">Review Submission</h1>
          <p class="admin-main__subtitle" id="review-subtitle"></p>
        </header>

        <div id="review-content">
          <p class="loading">Loading submission…</p>
        </div>
      </main>
    </div>

    <script type="module" src="/admin/review/review.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Text:ital@0;1&family=Urbanist:wght@300;400;500;600;700;800&display=swap"
    />
    <link rel="stylesheet" href="/shared/base/main.css" />
    <link rel="stylesheet" href="opportunities.css" />
    <title>Ekehi — Opportunities</title>
  </head>
  <body>
    <header class="site-header">
      <nav id="nav-root" class="nav" aria-label="Main navigation"></nav>
    </header>

    <main class="container">
      <header class="opportunities__header | text-center flex flex-col gap-2">
        <h1>Funding Opportunities</h1>
        <p>
          Explore various funding options available to support your projects and
          initiatives.
        </p>
      </header>

      <section class="opportunities__filters">
        <div class="opportunities__search">
          <div id="search-bar"></div>
        </div>

        <div
          class="opportunities__dropdowns | flex justify-start flex-wrap gap-4"
          id="filter-dropdowns"
        ></div>
      </section>

      <section id="opportunity-list-display" aria-label="opportunities">
        <div class="opportunities__tabs | flex" role="tablist">
          <button
            class="tab tab--active"
            role="tab"
            aria-selected="true"
            data-tab="all"
            id="tab-all"
          >
            All opportunities (<span id="tab-all-count">0</span>)
          </button>
          <button
            class="tab"
            role="tab"
            aria-selected="false"
            data-tab="saved"
            id="tab-saved"
          >
            Saved (<span id="tab-saved-count">0</span>)
          </button>
        </div>

        <h2 class="opportunities-total | text-lg" id="list-label"></h2>

        <div class="opportunity-list | flex flex-col">
          <div class="list-head"></div>
          <div class="opportunity-cards"></div>
        </div>
      </section>
    </main>

    <footer id="footer-root" class="footer"></footer>
    <script type="module" src="opportunities.js"></script>
  </body>
</html>

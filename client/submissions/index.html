<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Text:ital@0;1&family=Urbanist:wght@300;400;500;600;700;800&display=swap"
    />
    <link rel="stylesheet" href="/shared/base/main.css" />
    <link rel="stylesheet" href="submission.css" />
    <title>Ekehi — Submit an Opportunity</title>
  </head>
  <body>
    <header class="site-header">
      <nav id="nav-root" class="nav" aria-label="Main navigation"></nav>
    </header>

    <main class="container">
      <header class="submission__hero | text-center flex flex-col gap-2">
        <h1>Submit an opportunity</h1>
        <p>Have a great opportunity for women entrepreneurs? Share the details below for the Ekehi team to review before it goes live.</p>
      </header>

      <form id="submission-form" class="submission-form" novalidate>

        <!-- Section 1 -->
        <section class="form-section" id="section-about">
          <button type="button" class="form-section__toggle" aria-expanded="true" aria-controls="section-about-body">
            <span>1. About the opportunity</span>
            <svg class="form-section__chevron" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="18 15 12 9 6 15"/></svg>
          </button>

          <div class="form-section__body" id="section-about-body">
            <div class="form-field">
              <label for="opportunity_title">Opportunity name <span class="required" aria-hidden="true">*</span></label>
              <input class="input" type="text" id="opportunity_title" name="opportunity_title" placeholder="e.g Fisayo Rotibi Grant" required />
            </div>

            <div class="form-field">
              <label>Opportunity type <span class="required" aria-hidden="true">*</span></label>
              <div id="opportunity_type-mount"></div>
            </div>

            <div class="form-field">
              <label for="description">Opportunity description <span class="required" aria-hidden="true">*</span></label>
              <textarea
                class="input form-field__textarea"
                id="description"
                name="description"
                rows="6"
                placeholder="Briefly describe the opportunity, eligibility requirements, and what the applicants can expect..."
                required
              ></textarea>
            </div>

            <div class="form-field">
              <label for="eligibility_criteria">Eligibility criteria</label>
              <textarea
                class="input form-field__textarea"
                id="eligibility_criteria"
                name="eligibility_criteria"
                rows="3"
                placeholder="Who can apply? e.g. Women-owned businesses in Nigeria with 2+ years of operation..."
              ></textarea>
            </div>

            <div class="form-section__checkboxes">
              <div class="form-field form-field--checkbox">
                <input type="checkbox" id="is_women_only" name="is_women_only" />
                <label for="is_women_only">This opportunity is women-only</label>
              </div>
              <div class="form-field form-field--checkbox">
                <input type="checkbox" id="is_equity_free" name="is_equity_free" />
                <label for="is_equity_free">This opportunity is equity-free (no equity taken)</label>
              </div>
            </div>
          </div>
        </section>

        <!-- Section 2 -->
        <section class="form-section" id="section-details">
          <button type="button" class="form-section__toggle" aria-expanded="true" aria-controls="section-details-body">
            <span>2. Programme details</span>
            <svg class="form-section__chevron" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="18 15 12 9 6 15"/></svg>
          </button>

          <div class="form-section__body" id="section-details-body">
            <div class="form-row">
              <div class="form-field">
                <label for="amount_min">Min amount</label>
                <input class="input" type="number" id="amount_min" name="amount_min" placeholder="e.g 500000" min="0" />
              </div>
              <div class="form-field">
                <label for="amount_max">Max amount</label>
                <input class="input" type="number" id="amount_max" name="amount_max" placeholder="e.g 5000000" min="0" />
              </div>
              <div class="form-field">
                <label for="application_deadline">Deadline</label>
                <input class="input" type="date" id="application_deadline" name="application_deadline" />
              </div>
            </div>

            <div class="form-field">
              <label>Application status</label>
              <div id="status-mount"></div>
            </div>

            <fieldset class="form-field form-fieldset">
              <legend>Sectors <span class="form-fieldset__hint">Select all that apply</span></legend>
              <div class="form-checkbox-grid" id="sectors-grid"></div>
            </fieldset>

            <fieldset class="form-field form-fieldset">
              <legend>Business stage <span class="form-fieldset__hint">Select all that apply</span></legend>
              <div class="form-checkbox-grid" id="stages-grid"></div>
            </fieldset>
          </div>
        </section>

        <!-- Section 3 -->
        <section class="form-section" id="section-organizer">
          <button type="button" class="form-section__toggle" aria-expanded="true" aria-controls="section-organizer-body">
            <span>3. About the organizer</span>
            <svg class="form-section__chevron" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="18 15 12 9 6 15"/></svg>
          </button>

          <div class="form-section__body" id="section-organizer-body">
            <div class="form-field">
              <label for="funder_name">Organizer name <span class="required" aria-hidden="true">*</span></label>
              <input class="input" type="text" id="funder_name" name="funder_name" placeholder="e.g Fisayo Rotibi Foundation" required />
            </div>

            <div class="form-row">
              <div class="form-field">
                <label for="contact_email">Contact email</label>
                <input class="input" type="email" id="contact_email" name="contact_email" placeholder="hello@email.com" />
              </div>
              <div class="form-field">
                <label for="apply_url">Website (optional)</label>
                <input class="input" type="url" id="apply_url" name="apply_url" placeholder="www.abc.xyz" />
              </div>
            </div>

            <div class="form-field">
              <label>Location / Country</label>
              <div id="country-mount"></div>
            </div>
          </div>
        </section>

        <div id="form-feedback" class="form-feedback" aria-live="polite" hidden></div>

        <div class="form-actions">
          <button type="submit" class="btn btn--primary" id="submit-btn">Submit</button>
        </div>

      </form>
    </main>

    <footer id="footer-root" class="footer"></footer>
    <script type="module" src="submission.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Text:ital@0;1&family=Urbanist:wght@300;400;500;600;700;800&display=swap"
    />
    <link rel="stylesheet" href="/client/shared/base/main.css" />
    <link rel="stylesheet" href="signup.css" />
    <title>Sign up - Ekehi</title>
  </head>
  <body>
    <header class="site-header">
      <nav id="nav-root" class="nav" aria-label="Main navigation"></nav>
    </header>

    <main class="auth-container">
      <img src="/shared/assets/logo.svg" alt="Ekehi" class="auth-logo" />
      <h1 class="auth-title">Create your account</h1>
      <p class="auth-subtitle">
        Join us today and create your account to begin your journey!
      </p>

      <form id="signup-form" novalidate>
        <div id="firstname-field"></div>
        <div id="lastname-field"></div>
        <div id="email-field"></div>
        <div id="password-field"></div>
        <div id="submit-btn"></div>
        <p id="signup-error" class="auth-error" hidden></p>
      </form>

      <p class="auth-terms">
        By clicking Continue, you acknowledge that you have read and agree with
        Ekehi's <a href="/terms">Terms</a> and
        <a href="/privacy">Privacy Policy</a>.
      </p>
    </main>

    <footer id="footer-root" class="footer"></footer>

    <script src="/client/shared/components/button/button.js"></script>
    <script src="/client/shared/components/input/input.js"></script>
    <script src="/client/shared/components/nav/nav.js"></script>
    <script src="/client/shared/components/footer/footer.js"></script>
    <script src="/client/shared/services/api.js"></script>
    <script src="/client/shared/services/auth.service.js"></script>
    <script src="signup.js"></script>
  </body>
</html>
